<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PROCESS Chat</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      padding: 2rem 1rem;
    }
    #app {
      width: 100%;
      max-width: 720px;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    h1 { font-size: 1.4rem; color: #1a1a2e; }
    #backend-bar {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      background: #e0f2fe;
      border: 1px solid #bae6fd;
      border-radius: 6px;
      padding: 0.5rem 0.8rem;
      font-size: 0.88rem;
    }
    #backend-bar label { font-weight: 600; white-space: nowrap; }
    #backend-bar select, #backend-bar input {
      padding: 0.3rem 0.5rem;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 0.88rem;
    }
    #backend-bar select { min-width: 110px; }
    #backend-bar input  { flex: 1; }
    #backend-hint { font-size: 0.78rem; color: #64748b; }
    #chat-box {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 1rem;
      min-height: 320px;
      max-height: 480px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }
    .msg {
      padding: 0.5rem 0.75rem;
      border-radius: 6px;
      max-width: 80%;
      white-space: pre-wrap;
      line-height: 1.5;
    }
    .msg.user   { background: #dbeafe; align-self: flex-end; }
    .msg.assistant {
      background: #f0fdf4;
      align-self: flex-start;
      position: relative;
    }
    .msg.assistant .flag-btn {
      position: absolute;
      top: 4px;
      right: 6px;
      font-size: 0.7rem;
      background: #fee2e2;
      border: none;
      border-radius: 4px;
      padding: 2px 6px;
      cursor: pointer;
      color: #b91c1c;
    }
    #input-row {
      display: flex;
      gap: 0.5rem;
    }
    #user-input {
      flex: 1;
      padding: 0.6rem;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 1rem;
    }
    button.primary {
      padding: 0.6rem 1.1rem;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 1rem;
    }
    button.primary:disabled { background: #93c5fd; cursor: not-allowed; }
    #status { font-size: 0.85rem; color: #555; min-height: 1.2rem; }
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      justify-content: center;
      align-items: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #fff;
      border-radius: 8px;
      padding: 1.5rem;
      width: 420px;
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
    }
    .modal h2 { font-size: 1.1rem; }
    .modal label { font-size: 0.9rem; font-weight: 600; }
    .modal input, .modal select, .modal textarea {
      width: 100%;
      padding: 0.5rem;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 0.9rem;
    }
    .modal-actions { display: flex; gap: 0.5rem; justify-content: flex-end; }
    .modal-actions button { padding: 0.5rem 1rem; border-radius: 4px; border: none; cursor: pointer; }
    #modal-submit { background: #dc2626; color: #fff; }
    #modal-cancel { background: #e5e7eb; color: #333; }
  </style>
</head>
<body>
<div id="app">
  <h1>🤖 PROCESS Chat</h1>

  <!-- Backend info bar (read-only display — backend is set server-side via env vars) -->
  <div id="backend-bar">
    <label>Backend:</label>
    <select id="backend-display" disabled>
      <option value="ollama">🖥️ Ollama (local)</option>
      <option value="openai">☁️ OpenAI-compatible (Poe / GPT / …)</option>
    </select>
    <span id="backend-hint">Configure via LLM_BACKEND in server .env</span>
  </div>

  <div id="chat-box"></div>

  <div id="input-row">
    <input id="user-input" type="text" placeholder="Type your message…" autocomplete="off" />
    <button class="primary" id="send-btn" onclick="sendMessage()">Send</button>
  </div>

  <div id="status"></div>
</div>

<!-- Hallucination marking modal -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <h2>⚠️ Mark as Hallucination / Bad Case</h2>
    <input type="hidden" id="modal-msg-id" />

    <label for="modal-reason">Reason *</label>
    <textarea id="modal-reason" rows="3" placeholder="Describe what is wrong…"></textarea>

    <label for="modal-category">Category</label>
    <select id="modal-category">
      <option value="hallucination">Hallucination</option>
      <option value="intent_understanding">Intent Understanding</option>
      <option value="user_experience">User Experience</option>
    </select>

    <label for="modal-keywords">Ignored Keywords (comma-separated)</label>
    <input id="modal-keywords" type="text" placeholder="e.g. summer, slim-fit" />

    <label for="modal-reviewer">Reviewer</label>
    <input id="modal-reviewer" type="text" placeholder="Your name or ID" />

    <div class="modal-actions">
      <button id="modal-cancel" onclick="closeModal()">Cancel</button>
      <button id="modal-submit" onclick="submitMarkBad()">Submit</button>
    </div>
  </div>
</div>

<script>
  const API_BASE = "http://localhost:8000";  // Change if your server runs elsewhere
  let sessionId = null;
  const history = [];  // [{role, content}]

  // Probe the /health endpoint to learn the active backend
  (async () => {
    try {
      const r = await fetch(`${API_BASE}/health`);
      if (r.ok) {
        const data = await r.json();
        const sel = document.getElementById("backend-display");
        if (data.llm_backend === "openai") sel.value = "openai";
      }
    } catch (_) { /* server unreachable — leave default */ }
  })();

  function setStatus(msg) {
    document.getElementById("status").textContent = msg;
  }

  function appendMessage(role, content, messageId) {
    const box = document.getElementById("chat-box");
    const div = document.createElement("div");
    div.className = `msg ${role}`;
    div.textContent = content;

    if (role === "assistant" && messageId) {
      const btn = document.createElement("button");
      btn.className = "flag-btn";
      btn.textContent = "⚑ Flag";
      btn.onclick = () => openModal(messageId);
      div.appendChild(btn);
    }

    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
  }

  async function sendMessage() {
    const input = document.getElementById("user-input");
    const text = input.value.trim();
    if (!text) return;

    const btn = document.getElementById("send-btn");
    btn.disabled = true;
    setStatus("Thinking…");

    history.push({ role: "user", content: text });
    appendMessage("user", text, null);
    input.value = "";

    try {
      const res = await fetch(`${API_BASE}/chat`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          session_id: sessionId,
          messages: history,
          temperature: 0.7,
        }),
      });

      if (!res.ok) {
        const err = await res.json();
        setStatus(`Error: ${err.detail || res.statusText}`);
        return;
      }

      const data = await res.json();
      sessionId = data.session_id;
      history.push({ role: "assistant", content: data.assistant_message });
      appendMessage("assistant", data.assistant_message, data.assistant_message_id);
      setStatus("");
    } catch (e) {
      setStatus(`Network error: ${e.message}`);
    } finally {
      btn.disabled = false;
    }
  }

  document.getElementById("user-input").addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  function openModal(messageId) {
    document.getElementById("modal-msg-id").value = messageId;
    document.getElementById("modal-reason").value = "";
    document.getElementById("modal-keywords").value = "";
    document.getElementById("modal-reviewer").value = "";
    document.getElementById("modal-overlay").classList.add("open");
  }

  function closeModal() {
    document.getElementById("modal-overlay").classList.remove("open");
  }

  async function submitMarkBad() {
    const messageId = document.getElementById("modal-msg-id").value;
    const reason    = document.getElementById("modal-reason").value.trim();
    if (!reason) { alert("Please enter a reason."); return; }

    const keywords = document.getElementById("modal-keywords").value
      .split(",").map(k => k.trim()).filter(Boolean);

    const payload = {
      reason,
      category: document.getElementById("modal-category").value,
      reviewer: document.getElementById("modal-reviewer").value.trim() || null,
      ignored_keywords: keywords,
    };

    try {
      const res = await fetch(`${API_BASE}/audit/${messageId}/mark-bad`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload),
      });
      if (!res.ok) {
        const err = await res.json();
        alert(`Error: ${err.detail || res.statusText}`);
        return;
      }
      closeModal();
      setStatus("✅ Flagged as bad case.");
    } catch (e) {
      alert(`Network error: ${e.message}`);
    }
  }
</script>
</body>
</html>
